global:
  resolve_timeout: 1m
  slack_api_url_file: ''   # we use webhook URL inline below

route:
  receiver: 'slack-default'
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = "critical"
      receiver: 'slack-critical'
      continue: true
    - matchers:
        - severity = "warning"
      receiver: 'slack-default'

receivers:
  - name: 'slack-default'
    webhook_configs:
      - url: 'http://alert-relay:9097/alert'
        send_resolved: true

  - name: 'slack-critical'
    webhook_configs:
      - url: 'http://alert-relay:9097/alert'
        send_resolved: true

inhibit_rules:
  # If the whole service is down, don't also page about latency on it.
  - source_matchers: [alertname = "ServiceDown"]
    target_matchers: [severity = "warning"]
    equal: [service]
